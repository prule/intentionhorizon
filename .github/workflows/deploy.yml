name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the app and run the e2e suite on every push and pull request.
  # A failing build or e2e test fails this job, which gates the deploy below.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm must be on PATH before setup-node so its `cache: pnpm` works.
      # Version is read from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile


      # Only Chromium is configured in playwright.config.ts.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm build

      # Fast unit suite runs before e2e so logic failures surface before the
      # slower browser run; a failing unit test fails the job and gates deploy.
      - run: pnpm test:unit

      # Playwright starts its own dev server (CI=true disables reuse), and the
      # e2e seed hook is gated behind import.meta.env.DEV, so tests run against
      # the dev server rather than the production build.
      - run: pnpm e2e

  build:
    # Only build/deploy Pages on pushes to main, and only after tests pass.
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
