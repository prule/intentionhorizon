  <title>Intention Horizon</title>
  <script>
    // Swallow the benign, well-known "ResizeObserver loop" notice so it
    // doesn't surface as a console error. Not an app fault.
    window.addEventListener('error', function (e) {
      if (e && e.message && e.message.indexOf('ResizeObserver loop') !== -1) {
        e.stopImmediatePropagation();
      }
    });
  </script>

</head>
